{{- if and .Values.secrets.create (not .Values.secrets.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-acceptance.fullname" . }}
  labels:
    {{- include "k8s-acceptance.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.feishuWebhookUrl }}
  {{ .Values.secrets.feishuWebhookUrlKey }}: {{ .Values.secrets.feishuWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.s3AccessKey }}
  {{ .Values.secrets.s3AccessKeyKey }}: {{ .Values.secrets.s3AccessKey | quote }}
  {{- end }}
  {{- if .Values.secrets.s3SecretKey }}
  {{ .Values.secrets.s3SecretKeyKey }}: {{ .Values.secrets.s3SecretKey | quote }}
  {{- end }}
{{- end }}
