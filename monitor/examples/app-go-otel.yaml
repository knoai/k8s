# Go 应用接入 OpenTelemetry 示例
# Go 需要代码层面集成 SDK（无法自动注入）

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: payment-service
          image: your-registry/payment-service:v1.2.0
          ports:
            - containerPort: 8080
              name: http
          
          env:
            # OTel 核心配置
            - name: OTEL_SERVICE_NAME
              value: "payment-service"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=production,service.version=v1.2.0,deployment.environment=production"
            
            # OTLP 端点
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            
            # 采样配置
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.1"
          
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
# Go 应用示例代码 (main.go)
# 请保存到业务代码仓库中

